# Deploy LocalPlus API → Bunny Magic Container (Bangkok)
# Build + push the image, then roll the container to the new tag via Bunny's
# official container-update-image action (the blessed automated redeploy path).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BUNNY_REGISTRY_USER / BUNNY_REGISTRY_PASSWORD   registry.bunny.net push creds
#   BUNNY_API_KEY                                   Bunny account API key
#   BUNNY_APP_ID                                    Magic Containers application id
# And set the container name below to match the container name in your app config.

name: deploy-api-bkk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'localplus-architecture-audit/**'

env:
  IMAGE: registry.bunny.net/localplus-api/api
  CONTAINER_NAME: localplus-api   # must match the container name inside the Bunny app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Bunny container registry
        uses: docker/login-action@v3
        with:
          registry: registry.bunny.net
          username: ${{ secrets.BUNNY_REGISTRY_USER }}
          password: ${{ secrets.BUNNY_REGISTRY_PASSWORD }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Rolling update on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          api_key: ${{ secrets.BUNNY_API_KEY }}
          app_id: ${{ secrets.BUNNY_APP_ID }}
          container: ${{ env.CONTAINER_NAME }}
          image_tag: ${{ github.sha }}
