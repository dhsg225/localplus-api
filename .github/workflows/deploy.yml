# Deploy LocalPlus API → Bunny Magic Container (Bangkok)
# Build + push the image to GHCR, then roll the container to the new tag via
# Bunny's official container-update-image action.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   BUNNY_API_KEY    Bunny account API key
#   BUNNY_APP_ID     Magic Containers application id (from the app's page in dash.bunny.net)
# (The GHCR push uses the built-in GITHUB_TOKEN — no registry user/password secret needed.)
# Bunny pulls the new image using the GHCR registry integration you configured
# in dash.bunny.net → Magic Containers → Image Registries.

name: deploy-api-bkk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'localplus-architecture-audit/**'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/dhsg225/localplus-api
  CONTAINER_NAME: localplus-api   # must match the container name inside the Bunny app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Rolling update on Magic Containers
        uses: BunnyWay/actions/container-update-image@main
        with:
          api_key: ${{ secrets.BUNNY_API_KEY }}
          app_id: ${{ secrets.BUNNY_APP_ID }}
          container: ${{ env.CONTAINER_NAME }}
          image_tag: ${{ github.sha }}
